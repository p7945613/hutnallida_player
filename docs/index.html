<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>흩날리다 (Hutnallida) — Support</title>
  <style>
    :root { --fg:#111; --muted:#555; --bg:#fff; --card:#f6f6f7; --link:#0b66c3; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; color: var(--fg); background: var(--bg); }
    .wrap { max-width: 860px; margin: 0 auto; padding: 28px 18px 60px; }
    .card { background: var(--card); border-radius: 12px; padding: 18px; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    h2 { margin: 28px 0 10px; font-size: 18px; }
    p, li { line-height: 1.55; }
    .muted { color: var(--muted); }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { background: rgba(0,0,0,0.06); padding: 1px 6px; border-radius: 6px; }
    .links { display:flex; gap:12px; flex-wrap:wrap; margin-top: 10px; }
    .pill { display:inline-block; padding: 8px 12px; border-radius: 999px; background:#fff; border:1px solid rgba(0,0,0,0.08); }
    footer { margin-top: 28px; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>흩날리다 (Hutnallida)</h1>
    <p class="muted">숫자를 보고 규칙을 추리해 정답을 맞히는 숫자 추리 게임</p>

    <div class="card">
      <h2>바로가기</h2>
      <div class="links">
        <a class="pill" href="./support/">지원(Support)</a>
        <a class="pill" href="./privacy/">개인정보처리방침(Privacy)</a>
      </div>
      <p class="muted" style="margin-top:12px;">App Store Connect에 필요한 지원/개인정보 페이지를 제공합니다.</p>
    </div>

    <footer>
      <div>Repository: <a href="https://github.com/p7945613/hutnallida_player">github.com/p7945613/hutnallida_player</a></div>
    </footer>
  </div>
</body>
</html>
